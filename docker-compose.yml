version: "3.9"
services:
  frontend:
    image: ghcr.io/albrekhtdurer/film-react-nest/frontend:review-3
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "//albrekhtdurer.nomorepartiessite.ru/api/afisha"
        VITE_CDN_URL: "//albrekhtdurer.nomorepartiessite.ru/content/afisha"
    container_name: frontend
    networks:
      - webnet

  backend:
    image: ghcr.io/albrekhtdurer/film-react-nest/backend:review-3
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    networks:
      - webnet
    environment:
      - DATABASE_DRIVER=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=prac
      - DATABASE_PASSWORD=pracpass
      - DATABASE_NAME=prac
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: postgres
    volumes:
      - pg_data:/data/db
    environment:
      POSTGRES_USER: prac
      POSTGRES_DB: prac
      POSTGRES_PASSWORD: pracpass 
    networks:
      - webnet

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: fearnocait@gmail.com
      PGADMIN_DEFAULT_PASSWORD: PlushkiHrushki
    volumes:
      - pgadmin-data:/var/lib/pgadmin


  nginx:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    networks:
      - webnet
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/frontend/dist:ro


volumes:
  pg_data:
  frontend:
  pgadmin-data:

networks:
  webnet:
