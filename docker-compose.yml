version: "3.9"
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "//localhost/api/afisha"
        VITE_CDN_URL: "//localhost/content/afisha"
    container_name: frontend
    networks:
      - webnet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    networks:
      - webnet
    environment:
      - DATABASE_DRIVER=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=prac
      - DATABASE_PASSWORD=pracpass
      - DATABASE_NAME=prac
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: postgres
    volumes:
      - pg_data:/data/db
    environment:
      POSTGRES_USER: prac
      POSTGRES_DB: prac
      POSTGRES_PASSWORD: pracpass 
    networks:
      - webnet

  nginx:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    networks:
      - webnet
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/frontend/dist:ro


volumes:
  pg_data:
  frontend:

networks:
  webnet:
